<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Failover Proxy · 运行监控</title>
<link rel="stylesheet" href="/shared.css">
<script>
  // 主题：加载前应用避免闪烁
  const _t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', _t);
</script>
</head>
<body>

<div class="topbar">
  <div class="brand">API <span>Failover</span> Proxy</div>
  <nav class="nav">
    <a href="/admin">🔧 号池管理</a>
    <a href="/monitor" class="current">📊 运行监控</a>
  </nav>
  <div class="nav-spacer"></div>
  <button class="theme-toggle" onclick="toggleTheme()" title="切换深浅色"><span id="theme-icon">🌙</span></button>
</div>

<h1>运行监控</h1>
<div class="subtitle">实时渠道状态、用量统计、缓存命中、熔断状态</div>

<div style="margin-bottom:20px">
  <label class="toggle-auto"><input type="checkbox" id="autoRefresh" checked> 自动刷新（5s）</label>
</div>

<div class="stats" id="stats"></div>

<div class="grid">
  <!-- 最近请求（含上游聚合状态）-->
  <div class="card card-full">
    <h2>🎯 最近请求 <span id="upstream-summary" style="float:right;font-size:12px;font-weight:500;text-transform:none;letter-spacing:0"></span></h2>
    <div id="current-channel"><div class="empty">加载中...</div></div>
  </div>

  <!-- 最近请求列表 -->
  <div class="card card-full">
    <h2>📜 请求历史（最近 20 条）</h2>
    <div id="recent-requests" class="scroll"><div class="empty">加载中...</div></div>
  </div>

  <!-- 用量明细 -->
  <div class="card card-full">
    <h2>📋 用量明细（按上游×模型）</h2>
    <div id="usage" class="scroll"><div class="empty">加载中...</div></div>
  </div>
</div>

<script>
// 主题切换：深浅色，localStorage 记住
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-icon').textContent = next === 'dark' ? '🌙' : '☀';
}
(function initThemeIcon() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const el = document.getElementById('theme-icon');
  if (el) el.textContent = cur === 'dark' ? '🌙' : '☀';
})();

const GATEWAY_KEY = localStorage.getItem('gatewayKey') || 'sk-1234567890';
function headers() { return { 'Authorization': `Bearer ${GATEWAY_KEY}` }; }
function esc(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fmtTime(ts) {
  if (!ts) return '-';
  const d = ts > 1e12 ? new Date(ts) : new Date(ts);
  return d.toLocaleTimeString('zh-CN',{hour12:false}) + ' ' + d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
}
function fmtAgo(ts) {
  if (!ts) return '-';
  // timestamp 可能是 ISO 字符串（recent-requests）或毫秒数字（last-upstream），统一转毫秒
  const t = typeof ts === 'number' ? ts : new Date(ts).getTime();
  if (isNaN(t)) return '-';
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 0) return '刚刚';
  if (diff < 60) return diff + 's 前';
  if (diff < 3600) return Math.floor(diff/60) + 'm 前';
  return Math.floor(diff/3600) + 'h 前';
}
function fmtDuration(ms) {
  if (!ms && ms !== 0) return '-';
  if (ms < 1000) return ms + 'ms';
  return (ms/1000).toFixed(1) + 's';
}
function fmtNum(n) {
  if (n === 0) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return n.toString();
}
function fmtUptime(s) {
  if (!s) return '-';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 24) return Math.floor(h/24) + ' 天 ' + (h%24) + ' 小时';
  return h + 'h ' + m + 'm';
}

/* 统计卡片：today-stats + health 合并，单一写入 #stats 避免竞态 */
async function loadStats() {
  try {
    const [r, hr] = await Promise.all([
      fetch('/monitor/today-stats', {headers:headers()}).then(r=>r.json()),
      fetch('/health').then(r=>r.json())
    ]);
    if (!r.ok) throw new Error('fetch failed');
    const ups = hr.upstreams?.length || 0;
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="num c-white">${r.total}</div><div class="label">今日请求</div></div>
      <div class="stat-card"><div class="num c-green">${r.successCount ?? r.ok ?? 0}</div><div class="label">成功</div></div>
      <div class="stat-card"><div class="num c-red">${r.fail}</div><div class="label">失败</div></div>
      <div class="stat-card"><div class="num c-blue">${r.rate}%</div><div class="label">成功率</div></div>
      <div class="stat-card"><div class="num c-white">${fmtDuration(r.avgDuration)}</div><div class="label">平均耗时</div></div>
      <div class="stat-card"><div class="num c-yellow">${fmtNum(r.inputTokens)}</div><div class="label">输入 tokens</div></div>
      <div class="stat-card"><div class="num c-blue">${fmtNum(r.outputTokens)}</div><div class="label">输出 tokens</div></div>
      <div class="stat-card"><div class="num c-green">${fmtNum(r.cacheReadTokens||0)}</div><div class="label">缓存命中 tok</div></div>
      <div class="stat-card"><div class="num ${(r.savedTokens||0)>0?'c-green':'c-yellow'}">${fmtNum(r.savedTokens||0)}</div><div class="label">估算节省 tok</div></div>
      <div class="stat-card"><div class="num c-white">${fmtUptime(hr.uptime)}</div><div class="label">运行时长</div></div>
      <div class="stat-card"><div class="num c-yellow">${ups}</div><div class="label">上游数量</div></div>
    `;
  } catch(e) { document.getElementById('stats').innerHTML = '<div class="empty">加载失败</div>'; }
}

/* 上游状态：聚合为摘要，渲染到最近请求卡片标题右侧 */
async function loadUpstreams() {
  try {
    const [hr, br] = await Promise.all([
      fetch('/health').then(r=>r.json()),
      fetch('/monitor/breakers', {headers:headers()}).then(r=>r.json())
    ]);
    const ups = hr.upstreams || [];
    const bMap = {};
    (br.breakers||[]).forEach(b => bMap[b.name] = b);
    const el = document.getElementById('upstream-summary');
    if (!el) return;
    if (!ups.length) { el.innerHTML = '<span style="color:var(--text3)">无上游</span>'; return; }
    let online = 0, open = 0;
    const openNames = [];
    ups.forEach(u => {
      const b = bMap[u.name];
      if (b && b.open) { open++; openNames.push(u.name); }
      else online++;
    });
    const parts = [];
    if (online) parts.push(`<span class="badge badge-closed">${online} 在线</span>`);
    if (open) parts.push(`<span class="badge badge-open" title="${esc(openNames.join(', '))}">${open} 熔断</span>`);
    el.innerHTML = parts.join(' ');
  } catch(e) { const el = document.getElementById('upstream-summary'); if (el) el.innerHTML = '<span style="color:var(--text3)">加载失败</span>'; }
}

/* 最近一次请求 */
async function loadCurrent() {
  try {
    const r = await fetch('/monitor/last-upstream', {headers:headers()});
    const d = await r.json();
    if (!d.ok) { document.getElementById('current-channel').innerHTML = '<div class="empty">尚无请求记录</div>'; return; }
    const ago = fmtAgo(d.timestamp);
    document.getElementById('current-channel').innerHTML = `
      <div class="current-req">
        <div class="channel"><span class="pulsing-dot"></span>${esc(d.upstream)} <span class="badge badge-type">${esc(d.upstreamType)}</span></div>
        <div class="detail">模型: ${esc(d.usedModel||d.requestModel)} · ${fmtTime(d.timestamp)} · ${ago} · 耗时 ${fmtDuration(d.durationMs)}</div>
      </div>`;
  } catch(e) { document.getElementById('current-channel').innerHTML = '<div class="empty">加载失败</div>'; }
}

/* 用量明细 */
async function loadUsage() {
  try {
    const r = await fetch('/monitor/usage', {headers:headers()});
    const d = await r.json();
    const rows = d.rows || [];
    if (!rows.length) { document.getElementById('usage').innerHTML = '<div class="empty">无用量数据</div>'; return; }
    let html = '<table><thead><tr><th>日期</th><th>上游</th><th>模型</th><th>请求</th><th>失败</th><th>输入tok</th><th>输出tok</th><th>缓存命中</th></tr></thead><tbody>';
    rows.forEach(r => {
      const cacheHit = r.cacheReadTokens || 0;
      const hitBadge = cacheHit > 0 ? `<span class="badge badge-ok">${fmtNum(cacheHit)}</span>` : '-';
      html += `<tr><td>${r.date}</td><td><strong>${esc(r.upstream)}</strong></td><td style="font-size:11px">${esc(r.model)}</td><td class="num">${r.requests}</td><td class="num">${r.fails}</td><td class="num">${fmtNum(r.inputTokens||0)}</td><td class="num">${fmtNum(r.outputTokens||0)}</td><td class="num">${hitBadge}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('usage').innerHTML = html;
  } catch(e) { document.getElementById('usage').innerHTML = '<div class="empty">加载失败</div>'; }
}

/* 最近请求列表 */
async function loadRecent() {
  try {
    const r = await fetch('/monitor/recent-requests?limit=20', {headers:headers()});
    const d = await r.json();
    const reqs = d.requests || [];
    if (!reqs.length) { document.getElementById('recent-requests').innerHTML = '<div class="empty">无请求记录</div>'; return; }
    let html = '<table><thead><tr><th>时间</th><th>上游</th><th>模型</th><th>状态</th><th>耗时</th><th>tok(入/出)</th></tr></thead><tbody>';
    reqs.forEach(e => {
      const ok = e.success;
      const statusBadge = ok ? '<span class="badge badge-ok">✓</span>' : '<span class="badge badge-fail">✗</span>';
      const tok = `${fmtNum(e.inputTokens||0)}/${fmtNum(e.outputTokens||0)}`;
      html += `<tr><td style="font-size:11px">${fmtTime(e.timestamp)}</td><td><strong>${esc(e.upstream)}</strong></td><td style="font-size:11px">${esc(e.model)}</td><td>${statusBadge}</td><td class="num">${fmtDuration(e.duration)}</td><td class="num" style="font-size:11px">${tok}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('recent-requests').innerHTML = html;
  } catch(e) { document.getElementById('recent-requests').innerHTML = '<div class="empty">加载失败</div>'; }
}

/* 最近请求表 */
function loadAll() { loadStats(); loadUpstreams(); loadCurrent(); loadRecent(); loadUsage(); }
loadAll();
let timer = null;
function setupAuto() {
  if (timer) { clearInterval(timer); timer = null; }
  if (document.getElementById('autoRefresh').checked) timer = setInterval(loadAll, 5000);
}
document.getElementById('autoRefresh').addEventListener('change', setupAuto);
setupAuto();
</script>
</body>
</html>
